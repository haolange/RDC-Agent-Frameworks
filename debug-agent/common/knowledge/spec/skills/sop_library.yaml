# AIRD Framework · SOP Library
# 标准操作流程库 — 机器可读版本
# 格式版本: 1.0 | 最后更新: 2026-02-27
#
# 字段说明:
#   id                  : SOP 唯一标识
#   name                : 简短名称
#   category            : 问题大类
#   severity            : CRITICAL / HIGH / MEDIUM / LOW
#   target_invariants   : 本 SOP 针对验证/修复的不变量列表（精确匹配 invariant_library.yaml）
#   trigger_conditions  : 触发本 SOP 的条件组合
#     symptom_tags      : 症状标签（精确匹配 symptom_taxonomy.yaml）
#     trigger_tags      : 环境触发标签（精确匹配 trigger_taxonomy.yaml，可为空）
#     confidence_notes  : 说明何种组合下触发置信度最高
#   tool_chain          : 推荐工具链（按阶段组织）
#     stage_id          : 阶段编号
#     stage_name        : 阶段名称
#     objective         : 本阶段目标
#     tools             : 工具调用列表（精确匹配 rdx-mcp 暴露的工具名，如 rd.debug.pixel_history）
#     termination       : 终止条件（何时可以进入下一阶段）
#     output_artifacts  : 本阶段必须产出的证据类型
#   output_requirements : SOP 完成时必须产出的内容
#   fix_template        : 修复代码模板（HLSL/GLSL 示例）
#   counterfactual_spec : 反事实验证规范
#   linked_bugcards     : 历史关联案例

sops:

  # ─────────────────────────────────────
  # SOP-NAN-01: NaN/Inf 问题排查
  # ─────────────────────────────────────
  - id: SOP-NAN-01
    name: NaN/Inf 问题排查
    category: 数值问题
    severity: CRITICAL
    target_invariants: [I-NAN-01, I-NAN-02, I-SHADER-01, I-SHADER-02, I-SHADING-NONNEG-01]

    trigger_conditions:
      symptom_tags: [white_pixel, white_spot, nan_propagation, pixel_overflow, flickering, black_pixel]
      trigger_tags: []
      confidence_notes: >
        symptom_tags 包含 white_spot 或 nan_propagation 时置信度最高（>0.9）。
        black_pixel 也可能由 NaN 引起（硬件将 NaN 输出为最小值），置信度中等（0.6）。

    tool_chain:
      - stage_id: 1
        stage_name: 定位异常像素
        objective: "确定异常像素的精确坐标和初步值范围"
        tools:
          - tool: rd.export.screenshot
            purpose: "获取当前帧截图，人工标记异常区域"
            params: {}
          - tool: rd.texture.get_data
            purpose: "读取 RT 原始像素值，确认是否含 NaN/Inf"
            params:
              resource_id: "<渲染目标 RT ID>"
              x: "<异常像素 X>"
              y: "<异常像素 Y>"
              width: 1
              height: 1
        termination: "找到至少一个像素坐标，且确认该像素值含 NaN 或明显越界值（> 1.0 或 < 0）"
        output_artifacts: [pixel_coordinates, anomalous_pixel_value]

      - stage_id: 2
        stage_name: Pixel History 追溯
        objective: "定位首次产生 NaN 的 DrawCall 和 Shader 阶段（First Bad Event）"
        tools:
          - tool: rd.debug.pixel_history
            purpose: "获取目标像素的完整历史，逆序查找首次出现异常值的事件"
            params:
              x: "<来自阶段1的坐标>"
              y: "<来自阶段1的坐标>"
        termination: "找到 first_bad_event_id（首次输出 NaN/异常值的 DrawCall）"
        output_artifacts: [first_bad_event_id, propagation_path]

      - stage_id: 3
        stage_name: Shader 根因分析
        objective: "定位 Shader 中产生 NaN 的具体表达式"
        tools:
          - tool: rd.shader.get_source
            purpose: "获取 first_bad_event 的 Shader 源码"
            params:
              event_id: "<first_bad_event_id>"
              stage: "PS"
          - tool: rd.shader.debug_start
            purpose: "单步执行 Shader，检查 normalize/除法/sqrt 操作的实际输入值"
            params:
              event_id: "<first_bad_event_id>"
              x: "<异常像素 X>"
              y: "<异常像素 Y>"
        termination: "定位到具体的 Shader 代码行和产生 NaN 的表达式"
        output_artifacts: [suspicious_expression, shader_stage, code_line_ref]

      - stage_id: 4
        stage_name: 反事实验证
        objective: "验证修复假设：应用 SafeNormalize/SafeDivide 等保护函数后 NaN 消失"
        tools:
          - tool: rd.texture.get_data
            purpose: "应用 Patch 后重新读取同一像素值，确认异常消失"
            params:
              resource_id: "<RT ID>"
              x: "<异常像素 X>"
              y: "<异常像素 Y>"
        termination: "Patch 后目标像素值恢复正常（有限且在合理范围内）"
        output_artifacts: [counterfactual_test_result]

    output_requirements:
      mandatory:
        - type: first_bad_event
          description: "首次产生 NaN/Inf 的 DrawCall ID 和 Shader 阶段"
        - type: suspicious_expression
          description: "产生 NaN 的具体 Shader 表达式（含代码行引用）"
        - type: counterfactual_test_result
          description: "应用修复后的验证结果（pass/fail）"
      optional:
        - type: nan_heatmap
          description: "NaN 传播热力图（多个异常像素时建议提供）"

    fix_template:
      language: HLSL
      patterns:
        SafeNormalize: |
          float3 SafeNormalize(float3 v) {
              float len = length(v);
              return len > 1e-4f ? v / len : float3(0, 1, 0);
          }
        SafeDivide: |
          float SafeDivide(float a, float b) {
              return abs(b) > 1e-4f ? a / b : 0.0f;
          }
        SafeSqrt: |
          float SafeSqrt(float x) {
              return sqrt(max(0.0f, x));
          }
        NdotL_Guard: |
          float diffuse = max(0.0f, dot(normal, lightDir));

    counterfactual_spec:
      method: "在 first_bad_event 对应的 Shader 中应用修复，重新捕获或通过 Patch Engine 热替换，
               读取同一像素的新值并确认 isfinite() 为 true"
      success_criterion: "修复后目标像素值满足 isfinite() 且在 [0, HDR_MAX] 范围内"

    linked_bugcards: []

  # ─────────────────────────────────────
  # SOP-COLOR-01: 颜色失真问题排查
  # ─────────────────────────────────────
  - id: SOP-COLOR-01
    name: 颜色失真问题排查
    category: 颜色问题
    severity: HIGH
    target_invariants: [I-COLOR-01, I-COLOR-02, I-LIGHT-02]

    trigger_conditions:
      symptom_tags: [color_too_dark, color_too_bright, gamma_error, washed_out, color_distortion]
      trigger_tags: []
      confidence_notes: >
        gamma_error 标签置信度最高（>0.95）。
        color_too_dark 与 color_too_bright 同时出现时，优先排查 I-COLOR-01（双重 Gamma）。

    tool_chain:
      - stage_id: 1
        stage_name: RT 格式检查
        objective: "确认 Render Target 的像素格式（sRGB vs LINEAR）"
        tools:
          - tool: rd.pipeline.get_state
            purpose: "读取 RT 格式，区分 _SRGB 和 _UNORM 后缀"
            params:
              event_id: "<可疑 DrawCall ID>"
          - tool: rd.resource.get_details
            purpose: "获取纹理采样格式，确认输入纹理是否为 sRGB"
            params:
              texture_id: "<输入纹理 ID>"
        termination: "明确 RT 格式（sRGB/LINEAR）和主要输入纹理格式"
        output_artifacts: [rt_format, input_texture_format]

      - stage_id: 2
        stage_name: Gamma 链审计
        objective: "统计 Shader 中颜色空间转换的次数，判断是双重转换还是缺失转换"
        tools:
          - tool: rd.shader.get_source
            purpose: "搜索 pow/gamma/2.2/LinearToSRGB/SRGBToLinear 关键词，计数转换次数"
            params:
              event_id: "<可疑 DrawCall ID>"
              stage: "PS"
          - tool: rd.shader.debug_start
            purpose: "读取 Shader 输出的实际像素值，与预期值对比"
            params:
              event_id: "<可疑 DrawCall ID>"
              x: "<采样像素 X>"
              y: "<采样像素 Y>"
        termination: "确定 Gamma 转换次数（0/1/2）及其与 RT 格式的匹配关系"
        output_artifacts: [gamma_conversion_count, rt_shader_mismatch_analysis]

      - stage_id: 3
        stage_name: 反事实验证
        objective: "验证修复方案（统一颜色空间处理）后颜色恢复正常"
        tools:
          - tool: rd.texture.get_data
            purpose: "修复后读取同一区域像素值，与预期值对比"
            params:
              resource_id: "<RT ID>"
        termination: "修复后像素值与预期颜色值误差在可接受范围内（< 5% 相对误差）"
        output_artifacts: [counterfactual_test_result]

    output_requirements:
      mandatory:
        - type: rt_shader_mismatch_analysis
          description: "RT 格式与 Shader Gamma 处理的匹配分析（是否存在双重转换或缺失）"
        - type: counterfactual_test_result
          description: "修复后的颜色验证结果"
      optional:
        - type: color_diff_image
          description: "修复前后的颜色差异图"

    fix_template:
      language: HLSL
      patterns:
        sRGB_RT_Linear_Output: |
          // 方案 A：RT 格式为 _SRGB，Shader 输出 Linear（推荐）
          // 硬件自动处理 Linear -> sRGB 转换
          float4 main(PS_INPUT input) : SV_Target {
              float3 linearColor = ComputeLighting(input);
              return float4(linearColor, 1.0);  // 直接输出 Linear，RT 自动转换
          }
        Linear_RT_Manual_Gamma: |
          // 方案 B：RT 格式为 _UNORM（Linear），Shader 手动 Gamma 编码
          float3 LinearToSRGB(float3 linear) {
              return pow(max(linear, 0.0), 1.0 / 2.2);
          }
          float4 main(PS_INPUT input) : SV_Target {
              float3 linearColor = ComputeLighting(input);
              return float4(LinearToSRGB(linearColor), 1.0);
          }

    counterfactual_spec:
      method: "修复 RT 格式或 Shader Gamma 处理后，对比修复前后同一场景的像素值"
      success_criterion: "颜色差异与参考设备（如 Mali）的差异在视觉可接受范围内（Delta-E < 2）"

    linked_bugcards: []

  # ─────────────────────────────────────
  # SOP-GEO-01: 物体消失/可见性问题排查
  # ─────────────────────────────────────
  - id: SOP-GEO-01
    name: 物体消失/可见性问题排查
    category: 几何问题
    severity: HIGH
    target_invariants: [I-GEO-01, I-GEO-02, I-GEO-03]

    trigger_conditions:
      symptom_tags: [object_missing, object_invisible, backface_culling, culling]
      trigger_tags: []
      confidence_notes: >
        object_missing 且 DrawCall 确认存在时置信度最高（>0.9）。
        先确认 DrawCall 是否被正确提交（API Log），再进入管线分析。

    tool_chain:
      - stage_id: 1
        stage_name: DrawCall 确认
        objective: "确认物体的 DrawCall 是否被提交，排除 CPU 端剔除"
        tools:
          - tool: rd.event.get_actions
            purpose: "列出所有 DrawCall，确认目标物体的 Draw 是否存在"
            params: {}
        termination: "确认 DrawCall 存在（物体问题在 GPU 端）或不存在（问题在 CPU 端剔除）"
        output_artifacts: [drawcall_existence_confirmation]

      - stage_id: 2
        stage_name: 剔除状态检查
        objective: "检查 Rasterizer 剔除设置和面法线方向"
        tools:
          - tool: rd.pipeline.get_rasterizer_state
            purpose: "检查 CullMode 和 FrontCounterClockwise 设置"
            params:
              event_id: "<目标 DrawCall ID>"
          - tool: rd.shader.debug_start
            purpose: "读取 VS 输出的 clipPos，验证是否在 NDC 范围内"
            params:
              event_id: "<目标 DrawCall ID>"
        termination: "确定是剔除设置问题、变换问题还是索引问题"
        output_artifacts: [cull_mode_analysis, clip_position_analysis]

      - stage_id: 3
        stage_name: 变换链验证
        objective: "验证 MVP 矩阵链的正确性，检查负缩放问题"
        tools:
          - tool: rd.buffer.get_data
            purpose: "读取 Uniform Buffer 中的 MVP 矩阵值"
            params:
              buffer_id: "<变换 UBO ID>"
          - tool: rd.resource.get_details
            purpose: "检查顶点缓冲和索引缓冲的格式与大小"
            params:
              resource_id: "<VBO/IBO ID>"
        termination: "找到导致物体消失的具体原因（矩阵/剔除/索引）"
        output_artifacts: [mvp_matrix_analysis, root_cause_attribution]

      - stage_id: 4
        stage_name: 反事实验证
        objective: "应用修复后物体正确显示"
        tools:
          - tool: rd.export.screenshot
            purpose: "截图确认修复后物体可见"
            params: {}
        termination: "物体在修复后的截图中正确显示"
        output_artifacts: [counterfactual_test_result]

    output_requirements:
      mandatory:
        - type: root_cause_attribution
          description: "明确的根因：剔除设置 / MVP 矩阵 / 索引越界 / CPU 端剔除"
        - type: counterfactual_test_result
          description: "修复后物体可见性验证结果"

    fix_template:
      language: HLSL
      patterns:
        Dynamic_CullMode: |
          // 根据 World Matrix 行列式动态决定剔除方向
          // 用于修复负缩放导致的剔除反转
          // 注意：此逻辑在 CPU 端设置 RasterizerState，而非在 Shader 中
          bool isNegativeScale = determinant(worldMatrix) < 0;
          rasterizerState.CullMode = isNegativeScale ? CULL_FRONT : CULL_BACK;

    counterfactual_spec:
      method: "修复 CullMode 或矩阵后，截图确认物体可见性恢复"
      success_criterion: "目标物体在修复后的截帧中出现在预期位置"

    linked_bugcards: []

  # ─────────────────────────────────────
  # SOP-TEX-01: 纹理采样问题排查
  # ─────────────────────────────────────
  - id: SOP-TEX-01
    name: 纹理采样问题排查
    category: 纹理问题
    severity: HIGH
    target_invariants: [I-TEX-01, I-MIP-01, I-LOD-01, I-ALPHA-01, I-BLEND-01]

    trigger_conditions:
      symptom_tags: [texture_missing, uv_error, mipmap, blurry, stretched, tiling, alpha_error, blend_error]
      trigger_tags: []
      confidence_notes: >
        texture_missing 且纹理资源存在时，优先检查 UV 坐标和 Sampler 状态。
        blurry 优先检查 Mipmap 链完整性和 LOD Bias。

    tool_chain:
      - stage_id: 1
        stage_name: 纹理资源基础检查
        objective: "确认纹理资源存在且格式正确"
        tools:
          - tool: rd.resource.get_details
            purpose: "读取纹理宽高、格式、Mip 级别"
            params:
              texture_id: "<目标纹理 ID>"
          - tool: rd.texture.get_data
            purpose: "读取 Mip0 数据确认纹理内容"
            params:
              texture_id: "<目标纹理 ID>"
              mip: 0
              slice: 0
        termination: "确认纹理资源存在且 Mip0 内容正常"
        output_artifacts: [texture_info, texture_content_check]

      - stage_id: 2
        stage_name: UV 坐标和 Sampler 检查
        objective: "验证 UV 坐标范围和 Sampler 寻址模式"
        tools:
          - tool: rd.shader.debug_start
            purpose: "读取目标像素的 UV 坐标实际值"
            params:
              event_id: "<目标 DrawCall ID>"
              x: "<异常像素 X>"
              y: "<异常像素 Y>"
          - tool: rd.pipeline.get_state
            purpose: "检查 Sampler 的 AddressU/V、Filter、MipLODBias"
            params:
              event_id: "<目标 DrawCall ID>"
        termination: "确认 UV 范围和寻址模式是否匹配"
        output_artifacts: [uv_coordinates, sampler_state]

      - stage_id: 3
        stage_name: Mipmap 链验证（blurry 症状时）
        objective: "确认 Mipmap 链完整且各级内容正确"
        tools:
          - tool: rd.texture.get_data
            purpose: "逐级读取 Mip 数据，检查内容一致性"
            params:
              texture_id: "<目标纹理 ID>"
              mip: "<逐级检查>"
          - tool: rd.util.diff_images
            purpose: "对比不同 Mip 级别的采样结果"
            params:
              event1: "<基准 event>"
              event2: "<对比 event>"
        termination: "找到 Mipmap 链中内容异常的级别，或确认 LOD Bias 问题"
        output_artifacts: [mipmap_chain_analysis]

      - stage_id: 4
        stage_name: 反事实验证
        objective: "修复 UV 计算或 Sampler 设置后纹理显示正常"
        tools:
          - tool: rd.shader.debug_start
            purpose: "修复后重新读取 UV 值和纹理采样结果"
            params:
              event_id: "<目标 DrawCall ID>"
              x: "<像素 X>"
              y: "<像素 Y>"
        termination: "纹理显示符合预期"
        output_artifacts: [counterfactual_test_result]

    output_requirements:
      mandatory:
        - type: root_cause_attribution
          description: "明确的根因：UV 计算 / Sampler 设置 / Mipmap 链 / Alpha 混合"
        - type: counterfactual_test_result
          description: "修复后的纹理验证结果"

    fix_template:
      language: HLSL
      patterns:
        UV_Clamp: |
          // 强制 UV 在 [0,1] 范围内（当寻址模式为 Clamp 且 UV 越界时）
          float2 clampedUV = saturate(input.uv);
          float4 color = tex.Sample(sampler, clampedUV);
        Mipmap_Sampler: |
          SamplerState samplerAniso {
              Filter = ANISOTROPIC;
              MaxAnisotropy = 16;
              MipLODBias = 0;      // 重置为 0
              AddressU = Wrap;
              AddressV = Wrap;
          };

    counterfactual_spec:
      method: "修复 UV 或 Sampler 后，对比目标像素的纹理采样结果与预期颜色"
      success_criterion: "修复后采样结果与美术预期颜色误差在视觉可接受范围内"

    linked_bugcards: []

  # ─────────────────────────────────────
  # SOP-DEPTH-01: 深度问题排查
  # ─────────────────────────────────────
  - id: SOP-DEPTH-01
    name: 深度问题排查
    category: 深度问题
    severity: HIGH
    target_invariants: [I-DEPTH-01, I-DEPTH-02]

    trigger_conditions:
      symptom_tags: [z_fighting, depth_error, occlusion]
      trigger_tags: []
      confidence_notes: >
        z_fighting 置信度最高（>0.95）。
        occlusion 需先排除 Alpha Blend 顺序问题（I-BLEND-01），再考虑深度问题。

    tool_chain:
      - stage_id: 1
        stage_name: 深度缓冲可视化
        objective: "可视化深度缓冲，判断深度值分布是否合理"
        tools:
          - tool: rd.texture.get_data
            purpose: "读取深度缓冲原始数据"
            params:
              resource_id: "<深度缓冲 ID>"
              subresource: 0
          - tool: rd.pipeline.get_depth_stencil_state
            purpose: "读取 DepthEnable、DepthWriteMask、DepthFunc 设置"
            params:
              event_id: "<目标 DrawCall ID>"
        termination: "获得深度值分布信息和深度状态配置"
        output_artifacts: [depth_buffer_visualization, depth_state_config]

      - stage_id: 2
        stage_name: 深度状态异常定位
        objective: "确认深度测试/写入配置是否正确"
        tools:
          - tool: rd.pipeline.get_state
            purpose: "读取完整管线状态，包括近远平面设置"
            params:
              event_id: "<目标 DrawCall ID>"
          - tool: rd.debug.pixel_history
            purpose: "读取目标像素的深度历史"
            params:
              event_id: "<目标 DrawCall ID>"
              x: "<像素 X>"
              y: "<像素 Y>"
        termination: "定位深度配置问题（DepthFunc错误/写入未禁用/近远平面比例过大）"
        output_artifacts: [depth_config_analysis, depth_history]

      - stage_id: 3
        stage_name: 反事实验证
        objective: "修复深度配置后遮挡关系恢复正常"
        tools:
          - tool: rd.texture.get_data
            purpose: "读取修复后的深度缓冲，确认值分布合理"
            params:
              resource_id: "<深度缓冲 ID>"
        termination: "深度值分布合理，Z-fighting 或遮挡错误消失"
        output_artifacts: [counterfactual_test_result]

    output_requirements:
      mandatory:
        - type: depth_config_analysis
          description: "深度测试/写入/函数/近远平面的配置分析"
        - type: counterfactual_test_result
          description: "修复后的深度验证结果"

    fix_template:
      language: HLSL
      patterns:
        PolygonOffset_ZFighting: |
          // 修复 Z-Fighting：使用 Depth Bias
          RasterizerDesc {
              DepthBias = 100;
              DepthBiasClamp = 0.0f;
              SlopeScaledDepthBias = 1.0f;
          }
        Transparent_NoDepthWrite: |
          // 透明物体禁用深度写入
          DepthStencilDesc {
              DepthEnable = true;
              DepthWriteMask = D3D11_DEPTH_WRITE_MASK_ZERO;  // 禁用写入
              DepthFunc = D3D11_COMPARISON_LESS;
          }

    counterfactual_spec:
      method: "修复后截图并可视化深度缓冲，确认遮挡关系与预期一致"
      success_criterion: "Z-fighting 闪烁消失；透明物体不再错误遮挡后方物体"

    linked_bugcards: []

  # ─────────────────────────────────────
  # SOP-PREC-01: 精度问题排查
  # ─────────────────────────────────────
  - id: SOP-PREC-01
    name: 精度问题排查（含 Adreno RelaxedPrecision）
    category: 精度问题
    severity: MEDIUM
    target_invariants: [I-PREC-01, I-PREC-02, I-LIGHT-UNPACK-01]

    trigger_conditions:
      symptom_tags: [banding, artifact, gradient, precision, blackout, washout, hair_shading, local_light_unpack]
      trigger_tags: [Adreno_GPU, RelaxedPrecision]
      confidence_notes: >
        symptom_tags 包含 hair_shading 且 trigger_tags 包含 Adreno_GPU 时，
        置信度极高（>0.95），直接进入 SPIR-V Decoration 扫描阶段。
        banding/gradient 在无特定硬件触发时，优先检查 RT 格式精度。

    tool_chain:
      - stage_id: 1
        stage_name: 精度损失现象确认
        objective: "确认精度问题的表现形式：条带/设备差异/光照解包异常"
        tools:
          - tool: rd.export.screenshot
            purpose: "截图标注条带/异常区域"
            params: {}
          - tool: rd.pipeline.get_state
            purpose: "读取 RT 格式，确认精度位宽"
            params:
              event_id: "<目标 DrawCall ID>"
        termination: "明确精度问题类型（RT精度不足 / 设备相关 / 解包错误）"
        output_artifacts: [symptom_screenshot, rt_format_precision]

      - stage_id: 2
        stage_name: Shader 精度审计（Adreno 专项）
        objective: "扫描 Shader 中的 half 使用和 SPIR-V RelaxedPrecision decoration"
        tools:
          - tool: rd.shader.get_source
            purpose: "搜索 half 关键词，列出所有使用 half 类型的表达式"
            params:
              event_id: "<目标 DrawCall ID>"
              stage: "PS"
          - tool: rd.shader.debug_start
            purpose: "读取关键计算的中间值，对比 Adreno 与基准设备（Mali）的数值差异"
            params:
              event_id: "<目标 DrawCall ID>"
              x: "<异常像素 X>"
              y: "<异常像素 Y>"
        termination: "找到使用 half 的关键计算表达式，并确认其在 Adreno 上的数值异常"
        output_artifacts: [half_usage_list, spirv_decoration_analysis, device_value_diff]

      - stage_id: 3
        stage_name: 设备对比验证
        objective: "通过 A/B 对比确认问题为设备特定，排除内容本身问题"
        tools:
          - tool: rd.shader.get_source
            purpose: "对比 Adreno 与 Mali 的 Shader 编译结果（若有两份 capture）"
            params:
              event_id: "<目标 DrawCall ID>"
        termination: "确认「问题仅在 Adreno 上复现，Mali 正常」，排除内容必现可能"
        output_artifacts: [ab_device_comparison, content_vs_driver_attribution]

      - stage_id: 4
        stage_name: 反事实验证
        objective: "将 half 替换为 float 或添加 Precision Fence 后，Adreno 上渲染结果恢复正常"
        tools:
          - tool: rd.texture.get_data
            purpose: "修复后读取同一区域像素值，与 Mali 基准对比"
            params:
              resource_id: "<RT ID>"
        termination: "Adreno 修复后的颜色与 Mali 基准的差异在可接受范围内"
        output_artifacts: [counterfactual_test_result]

    output_requirements:
      mandatory:
        - type: half_usage_list
          description: "Shader 中所有使用 half 类型的关键表达式清单"
        - type: content_vs_driver_attribution
          description: "明确裁决：问题是「驱动/编译器」特定还是「内容本身」问题"
        - type: counterfactual_test_result
          description: "精度修复后的验证结果（对比 Mali 基准）"
      optional:
        - type: spirv_decoration_analysis
          description: "SPIR-V RelaxedPrecision decoration 扫描结果"

    fix_template:
      language: HLSL
      patterns:
        Float_Replacement: |
          // 将关键计算的 half 替换为 float
          // 修复前（Adreno 精度不足）：
          // half diffuse = dot(normal, lightDir) * lightColor.r;
          // 修复后：
          float diffuse = dot(normal, lightDir) * lightColor.r;
        PrecisionFence: |
          // Precision Fence：强制特定计算使用高精度
          // 方法：将中间结果写入 float RT，阻断 RelaxedPrecision 优化链
          float preciseValue = (float)halfValue;  // 强制精度提升

    counterfactual_spec:
      method: "将关键 half 替换为 float 后，在 Adreno 设备上重新捕获并对比像素值"
      success_criterion: "修复后 Adreno 与 Mali 的目标区域像素颜色差异小于 5%（相对误差）"

    linked_bugcards:
      - BUG-PREC-001
      - BUG-PREC-002

  # ─────────────────────────────────────
  # SOP-PERF-01: 性能问题排查
  # ─────────────────────────────────────
  - id: SOP-PERF-01
    name: 性能问题排查
    category: 性能问题
    severity: MEDIUM
    target_invariants: [I-PERF-01]

    trigger_conditions:
      symptom_tags: [stall, fps_drop, pipeline_error]
      trigger_tags: []
      confidence_notes: >
        stall 且帧时间分析显示 GPU bound 时置信度最高。
        先排除 CPU 瓶颈（DrawCall 数量、CPU 计算），再进入 GPU 分析。

    tool_chain:
      - stage_id: 1
        stage_name: 瓶颈类型识别
        objective: "判断性能瓶颈是 CPU bound、GPU bound 还是带宽 bound"
        tools:
          - tool: rd.core.get_logs
            purpose: "分析 API 调用序列，统计耗时和 DrawCall 频率"
            params:
              from: "<帧起始 event>"
              to: "<帧结束 event>"
          - tool: rd.resource.get_history
            purpose: "查找频繁的资源状态转换（Resource Barrier 开销）"
            params: {}
        termination: "确定主要瓶颈类型"
        output_artifacts: [bottleneck_type, api_timeline]

      - stage_id: 2
        stage_name: Pipeline Stall 定位
        objective: "找到引起 Stall 的具体 API 调用或资源转换"
        tools:
          - tool: rd.event.get_actions
            purpose: "列出各 DrawCall 的 GPU 时间占比"
            params: {}
          - tool: rd.pipeline.get_state
            purpose: "检查是否存在冗余的管线状态切换"
            params:
              event_id: "<耗时最长的 DrawCall>"
        termination: "找到具体的 Stall 触发点（缺少 Barrier / 过度同步 / 冗余状态切换）"
        output_artifacts: [stall_root_cause, optimization_candidates]

      - stage_id: 3
        stage_name: 优化验证
        objective: "应用优化后帧时间改善"
        tools:
          - tool: rd.core.get_logs
            purpose: "验证优化后的 API 调用序列，确认问题调用减少"
            params:
              from: "<帧起始 event>"
              to: "<帧结束 event>"
        termination: "优化后目标帧时间达到预期"
        output_artifacts: [counterfactual_test_result, performance_improvement_data]

    output_requirements:
      mandatory:
        - type: bottleneck_type
          description: "明确的瓶颈类型（CPU/GPU/带宽/同步）"
        - type: stall_root_cause
          description: "Stall 的具体触发位置和原因"
        - type: performance_improvement_data
          description: "优化前后帧时间对比数据"

    fix_template:
      language: pseudocode
      patterns:
        Batch_Resource_Barriers: |
          // 将多个分散的 Resource Barrier 合并为批量提交
          // 修复前（逐个提交）：
          // cmdList.ResourceBarrier(1, &barrier1);
          // cmdList.ResourceBarrier(1, &barrier2);
          // 修复后（批量提交）：
          // D3D12_RESOURCE_BARRIER barriers[] = {barrier1, barrier2};
          // cmdList.ResourceBarrier(2, barriers);

    counterfactual_spec:
      method: "应用优化后重新捕获帧，对比帧时间"
      success_criterion: "目标帧时间降低至预期范围内，Validation Layer 无新增报错"

    linked_bugcards: []

