# Skeptic 签署记录格式

# Artifact file format (sessions/<session_id>/skeptic_signoff.yaml):
# - Either a single YAML object (one Skeptic message), OR
# - A YAML list of message objects (recommended; append-only, chronological).
#
# BugCard signoff convention:
# - message_type: SKEPTIC_SIGN_OFF
# - to: curator_agent
# - target_hypothesis: bugcard
# - bugcard_skeptic_signed: true
#
# Hypothesis signoff convention:
# - message_type: SKEPTIC_SIGN_OFF
# - to: team_lead
# - target_hypothesis: <H-XXX>

# 用于 SKEPTIC_SIGN_OFF 消息的结构验证
skeptic_signoff_schema:
  required_fields:
    - message_type          # 必须为 "SKEPTIC_SIGN_OFF"
    - from                  # 必须为 "skeptic_agent"
    - to                    # "team_lead" 或 "curator_agent"
    - target_hypothesis     # 被审查的假设 ID（如 H-001）或 "bugcard"
    - blade_review          # 五把刀审查结果列表
    - sign_off              # 签署对象，含 signed (bool) 和 declaration

  blade_review_item_schema:
    required_fields:
      - blade               # 刀编号和名称，如 "刀1: 相关性刀"
      - result              # "pass" 或 "fail"
      - note                # 审查说明

  sign_off_schema:
    required_fields:
      - signed              # boolean，true 表示签署
    conditional_fields:
      - field: declaration
        condition: "signed == true"
        description: "签署声明（五把刀全部通过的确认）"
      - field: reason
        condition: "signed == false"
        description: "拒绝签署的原因"

# 用于 SKEPTIC_CHALLENGE 消息的结构验证
skeptic_challenge_schema:
  required_fields:
    - message_type          # 必须为 "SKEPTIC_CHALLENGE"
    - from                  # 必须为 "skeptic_agent"
    - to                    # "team_lead" 或 "curator_agent"
    - target_hypothesis     # 被质疑的假设 ID（如 H-001）或 "bugcard"
    - challenges            # 质疑列表，至少一条
    - sign_off              # 签署对象，挑战时必须 signed=false

  challenge_item_schema:
    required_fields:
      - challenge_id        # 唯一标识，如 SC-001
      - blade               # 对应的解剖刀编号
      - target_evidence     # 被质疑的具体证据引用
      - challenge           # 具体质疑内容
      - required_action     # 要求补充的具体行动
      - status              # "open" 或 "addressed"

# 验证规则
validation_rules:
  - rule: "sign_off.signed == true 时，blade_review 中所有 result 必须为 pass"
  - rule: "sign_off.signed == false 时，必须存在至少一条 result == fail 的 blade_review 项"
  - rule: "SKEPTIC_CHALLENGE 中所有 challenge 的 status 必须初始为 open"
