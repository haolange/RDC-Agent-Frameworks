# Debugger Framework · Project Plugin 示例
# 项目：ExampleMobileGame（虚构移动游戏项目）
# 用途：演示 Plugin 格式，可作为实际项目 Plugin 的模板

project_name: "ExampleMobileGame"
engine: "UnrealEngine 5.3"
plugin_version: "1.0.0"
debugger_framework_version: ">=2.0"
maintainer: "渲染技术组"
last_updated: "2026-02-27"

# ── 目标平台 ─────────────────────────────────────────────────
target_platforms:
  - Adreno_GPU        # 覆盖 Adreno 6xx / 7xx 系列
  - Mali_GPU          # Mali-G 系列，作为调试基准设备
  - Apple_GPU         # Apple GPU（Metal）
  - NVIDIA_GPU        # PC 开发机（用于初步验证）

# ── 材质模块 ─────────────────────────────────────────────────
material_blocks:
  - block_id: BASE_COLOR_BLOCK
    description: "角色基础色彩模块：采样 Diffuse 贴图并应用 Tint 颜色"
    hlsl_fingerprint: "BaseColor = tex2D(DiffuseMap, UV) * TintColor"
    engine_asset_path: "Materials/Characters/M_Character_Base"
    shader_files:
      - "Shaders/Character/BaseColor.usf"
    parameters:
      - DiffuseMap
      - TintColor
      - UV
    known_issues:
      - invariant: I-COLOR-01
        trigger: "sRGB RT 格式在 iOS 上启用双重 gamma 时"
        note: "M_Character_Base 在 iOS HDR 模式下有颜色空间双重转换风险"

  - block_id: LIGHTING_BLOCK
    description: "角色光照计算模块：Lambertian 漫反射 + 高光累加"
    hlsl_fingerprint: "half diffuse = dot(N, L) * LightColor.r"
    engine_asset_path: "Materials/Characters/M_Character_Lighting"
    shader_files:
      - "Shaders/Character/Lighting.usf"
      - "Shaders/Character/LightingUtils.usf"
    parameters:
      - NormalMap
      - LightColor
      - LightDirection
      - SpecularPower
    known_issues:
      - invariant: I-PREC-01
        trigger: "Adreno GPU + SPIR-V RelaxedPrecision 装饰"
        note: "half diffuse 在 Adreno 740 驱动 512.415.0+ 上存在 FP16 精度截断风险，已有历史案例 BUG-PREC-002"
      - invariant: I-LIGHT-UNPACK-01
        trigger: "LightColor.rgb 解包后值 > 32767（高强度 HDR 光照场景）"
        note: "HDR 场景下 LightColor 可能超出 FP16 安全范围"

  - block_id: HAIR_SHADING_BLOCK
    description: "头发着色模块：各向异性高光 + Kajiya-Kay 模型"
    hlsl_fingerprint: "half specular = pow(dot(T, H), SpecularExponent)"
    engine_asset_path: "Materials/Characters/Hair/M_Hair_Shading"
    shader_files:
      - "Shaders/Character/Hair/HairShading.usf"
    parameters:
      - TangentMap
      - SpecularExponent
      - HairColor
    known_issues:
      - invariant: I-PREC-01
        trigger: "Adreno GPU，任意驱动版本"
        note: "Kajiya-Kay 模型的 half 中间变量是历史高频 Bug 来源，参考 BUG-PREC-001"

  - block_id: SHADOW_MAP_BLOCK
    description: "阴影贴图采样与 PCF 过滤"
    hlsl_fingerprint: "float shadow = SampleShadowMap(ShadowTex, shadowCoord)"
    engine_asset_path: "Materials/Lighting/M_ShadowReceiver"
    shader_files:
      - "Shaders/Shadow/ShadowSampling.usf"
    parameters:
      - ShadowTex
      - ShadowMatrix
      - PCFKernelSize
    known_issues:
      - invariant: I-DEPTH-02
        trigger: "Vulkan + Mali-G 系列，深度比较函数配置差异"
        note: "某些 Mali 驱动对 depthCompareOp 的实现与规范存在细微差异"

  - block_id: PARTICLE_BLOCK
    description: "粒子特效渲染模块：加法混合 + 软粒子深度采样"
    hlsl_fingerprint: "float softFade = 1.0 - saturate((sceneDepth - particleDepth) / FadeDistance)"
    engine_asset_path: "Materials/Effects/M_Particle_Base"
    shader_files:
      - "Shaders/Effects/ParticleShading.usf"
    parameters:
      - ParticleColor
      - FadeDistance
      - SceneDepthTex
    known_issues: []

# ── 项目特有不变量 ─────────────────────────────────────────────
project_invariants:
  - id: P-METAL-01
    description: "角色材质金属度（Metallic）必须在 [0, 0.9] 范围内"
    rationale: "美术风格约束：项目采用半写实风格，完全金属度（Metallic=1.0）会破坏角色整体色彩协调性"
    detection_hint: "rd.shader.debug_start 检查 Metallic 参数值；若 > 0.9 触发此不变量警告"

  - id: P-ALPHA-01
    description: "角色半透明材质必须在独立的 Translucency Pass 中渲染，禁止与不透明对象混批"
    rationale: "性能约束：移动端 tile-based GPU 上混批会导致 tile 内存溢出"
    detection_hint: "rd.event.list_passes 检查半透明角色对象是否在 Translucency Pass 中"

  - id: P-LIGHTMAP-01
    description: "静态光照贴图分辨率不得超过 1024x1024"
    rationale: "包体大小约束：超出限制会导致应用包体超过平台审核大小限制"
    detection_hint: "rd.resource.get_details 检查 LightMap 纹理分辨率"

# ── 资源映射 ─────────────────────────────────────────────────
resource_mapping:
  - resource_id_pattern: "^tex_hair_"
    asset_category: "角色头发贴图"
    asset_path_prefix: "Textures/Characters/Hair/"

  - resource_id_pattern: "^tex_char_"
    asset_category: "角色身体贴图"
    asset_path_prefix: "Textures/Characters/Body/"

  - resource_id_pattern: "^tex_env_"
    asset_category: "环境贴图"
    asset_path_prefix: "Textures/Environment/"

  - resource_id_pattern: "^rt_shadow"
    asset_category: "阴影贴图 Render Target"
    asset_path_prefix: "(runtime)"

  - resource_id_pattern: "^rt_hair"
    asset_category: "头发着色 Render Target"
    asset_path_prefix: "(runtime)"

# ── 渲染管线特殊配置 ──────────────────────────────────────────
render_pipeline_notes:
  - pass_name: "HairRenderPass"
    description: "头发专用渲染 Pass（独立于角色主体 Pass），使用 OIT（Order-Independent Transparency）技术"
    known_issues:
      - "Adreno 740 上 OIT buffer 写入顺序不稳定（已知驱动 Bug，临时规避：降级为 Alpha Test）"

  - pass_name: "CharacterTranslucencyPass"
    description: "角色半透明材质（头发丝、服装薄纱）的独立渲染 Pass"
    known_issues:
      - "与 PostProcess Pass 存在资源同步依赖，在 Vulkan 上需要显式 barrier（参考 P-ALPHA-01）"

  - pass_name: "ShadowDepthPass"
    description: "级联阴影（CSM）深度图生成，4 级级联"
    known_issues: []
