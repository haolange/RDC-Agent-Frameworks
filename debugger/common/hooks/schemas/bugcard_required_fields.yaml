# BugCard 必填字段清单
# 任何 BugCard 入库前必须通过此 schema 验证

description: "BugCard 必填字段清单，由 bugcard_validator.py 使用"

required_fields:
  - field: bugcard_id
    type: string
    pattern: "^BUG-[A-Z]+-\\d{3}$"

  - field: title
    type: string
    min_length: 10
    max_length: 120

  - field: symptom_tags
    type: list
    min_items: 1
    item_source: "common/knowledge/spec/registry/active_manifest.yaml#symptom_taxonomy"

  - field: trigger_tags
    type: list
    min_items: 1
    item_source: "common/knowledge/spec/registry/active_manifest.yaml#trigger_taxonomy"

  - field: violated_invariants
    type: list
    min_items: 1
    item_source: "common/knowledge/spec/registry/active_manifest.yaml#invariant_catalog"

  - field: recommended_sop
    type: string
    pattern: "^SOP-[A-Z]+-\\d{2}$"
    item_source: "common/knowledge/spec/registry/active_manifest.yaml#sop_catalog"

  - field: causal_anchor_type
    type: string
    allowed_values: [first_bad_event, first_divergence_event, root_drawcall, root_expression]

  - field: causal_anchor_ref
    type: string
    min_length: 3

  - field: causal_chain_summary
    type: string
    min_length: 30
    max_length: 600

  - field: root_cause_summary
    type: string
    min_length: 30
    max_length: 500
    disallow_patterns:
      - "可能是"
      - "大概"
      - "不确定"
      - "maybe"
      - "probably"

  - field: fingerprint
    type: object
    required_subfields: [pattern, risk_category, shader_stage]

  - field: fix_verified
    type: boolean

  - field: verification
    type: object
    required_subfields: [reference_contract_ref, structural, semantic]

  - field: skeptic_signed
    type: boolean
    must_be: true

  - field: bugcard_skeptic_signed
    type: boolean
    must_be: true

optional_fields:
  - field: related_devices
    type: list

  - field: sop_improvement_notes
    type: string

  - field: action_chain_ref
    type: string
